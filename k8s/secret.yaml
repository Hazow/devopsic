apiVersion: v1
kind: Secret
metadata:
  name: ticketing-secret
  namespace: default
type: Opaque
# Values must be base64-encoded.
# Generate with: echo -n "your-value" | base64
# Never commit real credentials — replace these placeholders before applying.
stringData:
  POSTGRES_USER: ticketing_user
  POSTGRES_PASSWORD: REPLACE_BEFORE_APPLY
  POSTGRES_DB: ticketing
